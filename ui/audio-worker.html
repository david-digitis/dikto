<!DOCTYPE html>
<html>
<head><title>Audio Worker</title></head>
<body>
<script>
/**
 * Hidden audio worker — captures from OS microphone
 * using Web Audio API, outputs 16kHz mono Float32Array for sherpa-onnx.
 */

let mediaStream = null;
let audioContext = null;
let sourceNode = null;
let processorNode = null;
let audioChunks = [];
let isCapturing = false;
let currentDeviceId = null;
let releaseTimer = null;
let captureSampleRate = null;  // captured at record start — never guess it at stop

const TARGET_SAMPLE_RATE = 16000;
// Keep the mic stream alive between dictations to avoid getUserMedia cold-start
// (Intel Smart Sound DSP can take ~900ms to initialize on each acquisition).
const KEEP_ALIVE_MS = 60000;

// On load: enumerate audio devices and log them
(async function init() {
  try {
    // Request mic access first (needed to get device labels)
    const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    tempStream.getTracks().forEach(t => t.stop());

    const devices = await navigator.mediaDevices.enumerateDevices();
    const audioInputs = devices.filter(d => d.kind === 'audioinput');
    console.log('[AudioWorker] Available microphones:');
    audioInputs.forEach((d, i) => {
      console.log(`  [${i}] ${d.label} (id: ${d.deviceId.substring(0, 16)}...)`);
    });
    console.log('[AudioWorker] Ready. Total audio inputs:', audioInputs.length);
  } catch (err) {
    console.error('[AudioWorker] Init error:', err.message);
  }
})();

// Handle device enumeration request
window.audioWorker.onListDevices(async () => {
  try {
    const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    tempStream.getTracks().forEach(t => t.stop());
    const devices = await navigator.mediaDevices.enumerateDevices();
    const audioInputs = devices
      .filter(d => d.kind === 'audioinput')
      .map(d => ({ deviceId: d.deviceId, label: d.label || `Microphone ${d.deviceId.substring(0, 8)}` }));
    window.audioWorker.sendDevices(audioInputs);
  } catch (err) {
    console.error('[AudioWorker] listDevices error:', err.message);
    window.audioWorker.sendDevices([]);
  }
});

async function acquireMic(deviceId) {
  const audioConstraints = {
    channelCount: 1,
    echoCancellation: false,
    noiseSuppression: false,
    autoGainControl: true,
  };
  if (deviceId) {
    audioConstraints.deviceId = { exact: deviceId };
    console.log('[AudioWorker] Requesting device:', deviceId.substring(0, 16) + '...');
  } else {
    console.log('[AudioWorker] Using default microphone');
  }

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });
  } catch (constraintErr) {
    if (deviceId && constraintErr.name === 'OverconstrainedError') {
      console.warn('[AudioWorker] Device ID not found, falling back to default mic');
      delete audioConstraints.deviceId;
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });
    } else {
      throw constraintErr;
    }
  }

  const track = mediaStream.getAudioTracks()[0];
  const settings = track.getSettings();
  console.log('[AudioWorker] Mic track:', track.label);
  console.log('[AudioWorker] Settings:', JSON.stringify({
    sampleRate: settings.sampleRate,
    channelCount: settings.channelCount,
    deviceId: settings.deviceId?.substring(0, 16),
  }));

  // Pin the context to 16kHz so Chromium resamples the mic natively (high quality).
  // Relying on the hardware default rate caused a 2x sample-count bug on some cards
  // (Xonar reports 96kHz), producing half-speed audio and garbage transcriptions.
  audioContext = new AudioContext({ sampleRate: TARGET_SAMPLE_RATE });
  console.log('[AudioWorker] AudioContext rate:', audioContext.sampleRate, 'Hz (requested', TARGET_SAMPLE_RATE + ')');
  sourceNode = audioContext.createMediaStreamSource(mediaStream);
  currentDeviceId = deviceId || null;
}

function releaseMic() {
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  if (sourceNode) {
    sourceNode.disconnect();
    sourceNode = null;
  }
  if (audioContext) {
    audioContext.close();
    audioContext = null;
  }
  currentDeviceId = null;
  releaseTimer = null;
  console.log('[AudioWorker] Mic released (keep-alive expired)');
}

function scheduleRelease() {
  if (releaseTimer) clearTimeout(releaseTimer);
  releaseTimer = setTimeout(releaseMic, KEEP_ALIVE_MS);
}

function cancelRelease() {
  if (releaseTimer) {
    clearTimeout(releaseTimer);
    releaseTimer = null;
  }
}

window.audioWorker.onStartRecording(async (event, options) => {
  try {
    cancelRelease();
    audioChunks = [];

    const wantedDeviceId = (options && options.deviceId) || null;
    const needsAcquire = !mediaStream || wantedDeviceId !== currentDeviceId;

    if (needsAcquire) {
      // Device changed or never acquired — cleanup then re-acquire
      if (mediaStream) {
        if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
        if (audioContext) { audioContext.close(); audioContext = null; }
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
      const t0 = performance.now();
      await acquireMic(wantedDeviceId);
      console.log(`[AudioWorker] Mic acquisition took ${Math.round(performance.now() - t0)}ms`);
    } else {
      console.log('[AudioWorker] Reusing mic stream (keep-alive hit)');
    }

    // Build processor for this capture (cheap, ~1ms)
    const bufferSize = 4096;
    processorNode = audioContext.createScriptProcessor(bufferSize, 1, 1);

    let maxAmplitude = 0;
    processorNode.onaudioprocess = (e) => {
      if (!isCapturing) return;
      const inputData = e.inputBuffer.getChannelData(0);
      for (let i = 0; i < inputData.length; i++) {
        const abs = Math.abs(inputData[i]);
        if (abs > maxAmplitude) maxAmplitude = abs;
      }
      audioChunks.push(new Float32Array(inputData));
    };

    sourceNode.connect(processorNode);
    processorNode.connect(audioContext.destination);

    isCapturing = true;
    captureSampleRate = audioContext.sampleRate;
    console.log('[AudioWorker] Recording started at', captureSampleRate, 'Hz');

    const ampInterval = setInterval(() => {
      if (!isCapturing) { clearInterval(ampInterval); return; }
      console.log(`[AudioWorker] Max amplitude: ${maxAmplitude.toFixed(4)} (${maxAmplitude > 0.01 ? 'AUDIO OK' : 'SILENCE/NO SIGNAL'})`);
      maxAmplitude = 0;
    }, 1000);

  } catch (err) {
    console.error('[AudioWorker] Start error:', err.message);
    window.audioWorker.sendError(err.message);
  }
});

window.audioWorker.onStopRecording(() => {
  isCapturing = false;

  try {
    // Detach processor to stop CPU usage. Keep mediaStream + audioContext + sourceNode
    // alive for fast re-start (no getUserMedia cold-start on next dictation).
    if (processorNode) {
      processorNode.disconnect();
      processorNode = null;
    }
    if (sourceNode) {
      sourceNode.disconnect();
    }

    // Schedule full release after KEEP_ALIVE_MS of inactivity
    scheduleRelease();

    if (audioChunks.length === 0) {
      window.audioWorker.sendError('No audio captured');
      return;
    }

    // Merge all chunks
    const totalLength = audioChunks.reduce((sum, chunk) => sum + chunk.length, 0);
    const merged = new Float32Array(totalLength);
    let offset = 0;
    for (const chunk of audioChunks) {
      merged.set(chunk, offset);
      offset += chunk.length;
    }
    audioChunks = [];

    // Resample to 16kHz if needed. Use the rate captured at record start —
    // never audioContext.sampleRate here (it can be null/stale at stop time).
    const nativeSampleRate = captureSampleRate || TARGET_SAMPLE_RATE;
    let outputSamples;

    if (Math.abs(nativeSampleRate - TARGET_SAMPLE_RATE) < 100) {
      outputSamples = merged;
    } else {
      outputSamples = resample(merged, nativeSampleRate, TARGET_SAMPLE_RATE);
    }

    // Check if we got actual audio or just silence
    let maxVal = 0;
    for (let i = 0; i < outputSamples.length; i++) {
      const abs = Math.abs(outputSamples[i]);
      if (abs > maxVal) maxVal = abs;
    }

    console.log(`[AudioWorker] Captured ${(outputSamples.length / TARGET_SAMPLE_RATE).toFixed(1)}s, max amplitude: ${maxVal.toFixed(4)}`);

    if (maxVal < 0.001) {
      console.warn('[AudioWorker] WARNING: Audio appears to be silence! Wrong microphone?');
    }

    // Send to main process
    window.audioWorker.sendAudioData(Array.from(outputSamples));

  } catch (err) {
    console.error('[AudioWorker] Stop error:', err);
    window.audioWorker.sendError(err.message);
  }
});

function resample(input, fromRate, toRate) {
  const ratio = fromRate / toRate;
  const outputLength = Math.round(input.length / ratio);
  const output = new Float32Array(outputLength);

  for (let i = 0; i < outputLength; i++) {
    const srcIndex = i * ratio;
    const srcFloor = Math.floor(srcIndex);
    const srcCeil = Math.min(srcFloor + 1, input.length - 1);
    const frac = srcIndex - srcFloor;
    output[i] = input[srcFloor] * (1 - frac) + input[srcCeil] * frac;
  }

  return output;
}
</script>
</body>
</html>
